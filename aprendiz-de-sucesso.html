<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estilos da Página Baseados na Identidade Visual */
        :root {
            --azul-projeto: #0040A1; /* */
            --verde-projeto: #9BC836; /* */
            --branco: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--azul-projeto);
            font-family: 'Montserrat', sans-serif;
            color: var(--branco);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px; 
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            color: var(--verde-projeto);
            font-weight: 900;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 25px;
        }

        .headline {
            margin-bottom: 30px;
        }

        .headline h2 {
            font-size: 1.5rem;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .headline p {
            font-size: 1rem;
            opacity: 0.9;
            font-weight: 400;
            line-height: 1.5;
        }

        .video-section {
            margin-bottom: 35px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .cta-section {
            margin: 20px 0;
        }

        /* --- BOTÃO COM EFEITO PULSANTE --- */
        .btn-whatsapp {
            display: inline-block;
            background-color: var(--verde-projeto);
            color: var(--azul-projeto);
            padding: 18px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.1rem;
            width: 100%;
            cursor: pointer;
            border: none;
            position: relative;
            animation: pulse-green 2s infinite;
            transition: transform 0.2s ease;
        }

        .btn-whatsapp:hover {
            transform: scale(1.03);
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(155, 200, 54, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(155, 200, 54, 0); }
            100% { box-shadow: 0 0 0 0 rgba(155, 200, 54, 0); }
        }

        /* --- IMAGEM SEM EFEITO --- */
        .image-container {
            margin: 30px 0;
            width: 100%;
        }

        .static-image {
            width: 100%;
            max-width: 100%;
            border-radius: 15px;
            display: block;
        }

        /* --- ESTILOS DO VÍDEO (REPLICADOS) --- */
        #vsl-container { position: relative; max-width: 100%; height: auto; }
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; }
        #player-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #contextBlocker { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: auto; }
        
        .overlay-audio, .overlay-pause { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            text-align: center; z-index: 4; flex-direction: column; font-family: sans-serif; 
        }

        .audio-content { 
            background: #4564FF; padding: 15px 20px; border: solid 2px white; 
            border-radius: 16px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.3); 
            display: flex; flex-direction: column; align-items: center; 
            cursor: pointer; max-width: 260px; width: 85%; animation: fadeIn 0.8s ease; 
        }

        .audio-content p { margin: 5px 0; color: white; font-size: 1rem; font-weight: bold; }
        .volume-video { width: 60px; height: 60px; border-radius: 8px; pointer-events: none; }
        .overlay-pause { display: none; background-color: transparent; }
        .pause-play-button { width: 70px; height: 70px; background: #4564FFE0; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .pause-icon { width: 25px; height: 25px; }
        .progress-bar { height: 6px; background: white; width: 0%; position: absolute; bottom: 0; left: 0; z-index: 2; transition: width 0.2s ease; }

        /* Estilo do Ícone do Instagram */
        .footer-social {
            margin-top: 30px;
            padding-bottom: 20px;
        }
        .instagram-link {
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .instagram-link:hover {
            transform: scale(1.1);
        }
        .instagram-link svg {
            fill: var(--branco);
            width: 32px;
            height: 32px;
        }
    </style>
</head>
<body>

<script>
    // SCRIPT ORIGINAL COM VIDEO ID ATUALIZADO
    let tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    let player, interval;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        videoId: 'VrvsXzg1_zs', // ID Atualizado conforme solicitado
        playerVars: {
          'autoplay': 1,
          'controls': 0,
          'mute': 1,
          'rel': 0,
          'modestbranding': 1,
          'showinfo': 0,
          'enablejsapi': 1,
          'fs': 0,
          'playsinline': 1
        },
        events: {
          'onReady': onPlayerReady,
          'onStateChange': onPlayerStateChange
        }
      });
    }

    function onPlayerReady(event) {
      event.target.playVideo();
      updateProgress();
    }

    function updateProgress() {
      interval = setInterval(() => {
        if (player && player.getDuration) {
          const duration = player.getDuration();
          const current = player.getCurrentTime();
          const percent = (current / duration) * 100;
          document.getElementById("progressBar").style.width = percent + "%";
        }
      }, 500);
    }

    document.getElementById("unmuteBtn").addEventListener("click", () => {
      player.unMute();
      player.seekTo(0);
      player.playVideo();
      document.getElementById("audioOverlay").style.display = "none";
    });

    document.getElementById("resumeBtn").addEventListener("click", () => {
      player.playVideo();
      document.getElementById("pauseOverlay").style.display = "none";
    });

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.PAUSED) {
        document.getElementById("pauseOverlay").style.display = "flex";
      } else {
        document.getElementById("pauseOverlay").style.display = "none";
      }
    }

    const blocker = document.getElementById("contextBlocker");
    blocker.addEventListener("contextmenu", function (e) { e.preventDefault(); });
    blocker.addEventListener("click", function () {
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) { player.pauseVideo(); } else { player.playVideo(); }
    });

    document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
</script>

</body>
